<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tantraz Registration</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #1e3c72, #2a5298);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

form {
  background: white;
  padding: 25px;
  border-radius: 10px;
  width: 350px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
}

input, select, textarea {
  width: 100%;
  padding: 8px;
  margin: 8px 0;
}

.radio-group, .checkbox-group {
  margin: 8px 0;
}

button {
  width: 100%;
  padding: 10px;
  background-color: #1e3c72;
  color: white;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background-color: #16335a;
}
</style>
</head>
<body>

<form aria-labelledby="form-heading">

<h2 id="form-heading">Tantraz Registration</h2>

<!-- Full Name -->
<label for="fullname">Full Name</label>
<input type="text"
       id="fullname"
       name="fullname"
       required
       minlength="3"
       aria-required="true"
       aria-label="Enter your full name"
       placeholder="Enter your full name">

<!-- Email -->
<label for="email">Email</label>
<input type="email"
       id="email"
       name="email"
       required
       aria-required="true"
       aria-label="Enter your email address"
       placeholder="example@email.com">

<!-- Participation Category -->
<label for="category">Participation Category</label>
<select id="category"
        name="category"
        required
        aria-required="true"
        aria-label="Select participation category">

  <option value="">-- Select Category --</option>
  <option value="individual">Individual</option>
  <option value="team">Team</option>
  <option value="audience">Audience</option>
</select>

<!-- T-Shirt Size -->
<label>T-Shirt Size</label>
<div class="radio-group" role="radiogroup" aria-label="Select T-shirt size">

  <input type="radio" id="s" name="tshirt" value="S" required>
  <label for="s">S</label>

  <input type="radio" id="m" name="tshirt" value="M">
  <label for="m">M</label>

  <input type="radio" id="l" name="tshirt" value="L">
  <label for="l">L</label>

  <input type="radio" id="xl" name="tshirt" value="XL">
  <label for="xl">XL</label>

</div>

<!-- Technical Interests -->
<label>Technical Interests</label>
<div class="checkbox-group" aria-label="Select technical interests">

  <input type="checkbox" id="ai" name="interest" value="AI">
  <label for="ai">AI</label>

  <input type="checkbox" id="web" name="interest" value="Web Dev">
  <label for="web">Web Dev</label>

  <input type="checkbox" id="cloud" name="interest" value="Cloud Computing">
  <label for="cloud">Cloud Computing</label>

</div>

<!-- Expectations -->
<label for="expectations">Expectations / Suggestions</label>
<textarea id="expectations"
          name="expectations"
          rows="4"
          aria-label="Write your expectations or suggestions"
          placeholder="Write something..."></textarea>

<button type="submit">Register Now</button>

</form>
<p style="text-align:center; margin-top:10px;">
Already have account?
<a href="signin.html">Sign In</a>
</p>

<p style="text-align:center;">
New user?
<a href="signup.html">Create Account</a>
</p>

</body>
</html>
